name: ci

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Forgejo-owned tag to retry (for example, v0.1.7)
        required: true
        type: string
      draft:
        description: Create or update a draft release instead of publishing it
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  # Primary OCI registry host or prefix (Forgejo/Gitea/Codeberg/etc.).
  # The release job also mirrors to ghcr.io/<owner>/<repo> when running on GitHub.
  # Do not use `||` here: Forgejo runner 0.6.1 formats a non-empty string
  # fallback as `%!t(string=...)`. GitHub publishing defaults to ghcr.io below.
  CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
  # Demo tailnet only — never runs production ACL save E2E (see test:e2e:production).
  TAILSCALE_API_KEY: tskey-api-tailor-dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.2.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --dir web lint

      - name: Check frontend
        run: pnpm --dir web check

      - name: Test frontend (Vitest)
        run: pnpm --dir web test

      - name: Build frontend
        run: pnpm --dir web build

      - name: Test Go
        run: go test ./...

      - name: Test Go (dev build)
        run: go test -tags dev ./...

      - name: Vet Go
        run: go vet ./...

      - name: Install Playwright Chromium
        if: github.server_url == 'https://github.com'
        run: pnpm --dir web exec playwright install --with-deps chromium

      - name: E2E tests (demo tailnet)
        if: github.server_url == 'https://github.com'
        run: pnpm --dir web test:e2e

  forgejo-e2e:
    if: github.server_url != 'https://github.com'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.2.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: E2E tests (demo tailnet)
        run: pnpm --dir web test:e2e

  release:
    needs: [test, forgejo-e2e]
    # Forgejo is the source of truth for release tags. Its push mirror delivers
    # the same immutable tag to GitHub, where this job publishes the stable
    # release. Forgejo branch pushes also publish a rolling dev prerelease.
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (github.server_url == 'https://github.com' || needs.forgejo-e2e.result == 'success') &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
       (github.event_name == 'push' &&
        startsWith(github.ref, 'refs/heads/') &&
        github.ref_name != 'main' &&
        github.server_url != 'https://github.com'))
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release context
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags origin

          dev_release=false
          prerelease=false

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$TAG"
            stable_release=true
          elif printf '%s\n' "$GITHUB_REF" | grep -Eq '^refs/tags/v'; then
            tag="$GITHUB_REF_NAME"
            stable_release=true
          else
            tag="dev"
            stable_release=false
            dev_release=true
            prerelease=true
          fi

          if [ "$stable_release" = "true" ]; then
            if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Release tags must be stable semver tags such as v0.1.7."
              exit 1
            fi

            if ! git show-ref --verify --quiet "refs/tags/${tag}"; then
              echo "Tag $tag does not exist. Create it in Forgejo and let the push mirror copy it."
              exit 1
            fi

            # Verify the tag exists on Forgejo remote (origin is the Forgejo push mirror source)
            forgejo_sha="$(git ls-remote origin "refs/tags/${tag}^{}" 2>/dev/null | awk '{print $1}' | head -1)"
            if [ -z "$forgejo_sha" ]; then
              # Try non-dereferenced form as fallback (lightweight tags)
              forgejo_sha="$(git ls-remote origin "refs/tags/${tag}" 2>/dev/null | awk '{print $1}' | head -1)"
            fi
            if [ -z "$forgejo_sha" ]; then
              echo "Tag $tag does not exist on the Forgejo remote."
              exit 1
            fi

            target_sha="$(git rev-parse "${tag}^{commit}")"
            if [ "$forgejo_sha" != "$target_sha" ]; then
              echo "Tag $tag on Forgejo remote points to $forgejo_sha, but local tag points to $target_sha."
              exit 1
            fi
          else
            target_sha="$(git rev-parse HEAD)"
          fi

          head_sha="$(git rev-parse HEAD)"
          if [ "$target_sha" != "$head_sha" ]; then
            echo "Checked out $head_sha, but tag $tag points to $target_sha."
            exit 1
          fi

          if [ "$stable_release" = "true" ] && [ "${GITHUB_SERVER_URL}" = "https://github.com" ]; then
            release="$(
              gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
                --jq ".[] | select(.tag_name == \"${tag}\") | [.draft, .target_commitish] | @tsv" \
                | head -1
            )"
            if [ -n "$release" ]; then
              IFS=$'\t' read -r is_draft target_commitish <<< "$release"
              if [ "$is_draft" != "true" ]; then
                echo "Published release $tag already exists; refusing to overwrite it."
                exit 1
              fi
              if [ "$target_commitish" != "$target_sha" ]; then
                echo "Draft release $tag targets $target_commitish, not $target_sha."
                exit 1
              fi
            fi
          fi

          if [ "$dev_release" = "true" ]; then
            version="dev"
          else
            version="${tag#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "stable_release=${stable_release}" >> "$GITHUB_OUTPUT"
          echo "dev_release=${dev_release}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Release: ${tag} at ${target_sha} (draft=${{ inputs.draft || false }}, prerelease=${prerelease})"

      - name: Compute container image tags
        id: image-tags
        shell: bash
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          repo="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          registry="${CONTAINER_REGISTRY}"

          if [ -z "$registry" ] && [ "$GITHUB_SERVER_URL" = "https://github.com" ]; then
            registry="ghcr.io"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

          declare -A seen=()
          tags=()
          primary_publish=false
          ghcr_publish=false

          add_stable_tags() {
            local image="$1"
            for suffix in "$version" "$tag" latest; do
              local full="${image}:${suffix}"
              if [ -z "${seen[$full]+x}" ]; then
                seen["$full"]=1
                tags+=("$full")
              fi
            done
          }

          add_dev_tags() {
            local image="$1"
            local full="${image}:dev"
            if [ -z "${seen[$full]+x}" ]; then
              seen["$full"]=1
              tags+=("$full")
            fi
          }

          add_tags() {
            if [ "${{ steps.release.outputs.dev_release }}" = "true" ]; then
              add_dev_tags "$1"
            else
              add_stable_tags "$1"
            fi
          }

          if [ -n "$registry" ] && [ "$registry" != "ghcr.io" ] && [ -n "${REGISTRY_TOKEN:-}" ]; then
            primary_publish=true
            add_tags "${registry}/${repo}"
          fi

          if [ "${GITHUB_SERVER_URL}" = "https://github.com" ]; then
            ghcr_publish=true
            add_tags "ghcr.io/${repo}"
          fi

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No container registry publish target is configured."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "primary_publish=${primary_publish}" >> "$GITHUB_OUTPUT"
          echo "ghcr_publish=${ghcr_publish}" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.2.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web build

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          staging="dist/release"
          mkdir -p "$staging"

          build() {
            local goos="$1" goarch="$2" name="$3"
            local out="${staging}/${name}"
            echo "Building ${goos}/${goarch} -> ${name}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -trimpath -ldflags="-s -w" \
              -o "$out" ./cmd/tailor
          }

          package_unix() {
            local goos="$1" goarch="$2" bin_name="$3" archive_name="$4"
            build "$goos" "$goarch" "$bin_name"
            chmod +x "${staging}/${bin_name}"
            tar -C "$staging" -czf "${staging}/${archive_name}" "$bin_name"
            rm "${staging}/${bin_name}"
          }

          package_unix linux amd64 tailor "tailor_${version}_linux_amd64.tar.gz"
          package_unix linux arm64 tailor "tailor_${version}_linux_arm64.tar.gz"
          package_unix darwin amd64 tailor "tailor_${version}_darwin_amd64.tar.gz"
          package_unix darwin arm64 tailor "tailor_${version}_darwin_arm64.tar.gz"

          build windows amd64 tailor.exe
          (
            cd "$staging"
            zip -q "tailor_${version}_windows_amd64.zip" tailor.exe
            rm tailor.exe
          )

          (
            cd "$staging"
            sha256sum tailor_"${version}"_* > "tailor_${version}_checksums.txt"
          )

          ls -la "$staging"

      - name: Move rolling dev tag
        if: steps.release.outputs.dev_release == 'true'
        run: |
          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@users.noreply.local"
          git tag --force dev "${{ steps.release.outputs.target_sha }}"
          git push --force origin refs/tags/dev

      - name: Verify release tag
        run: |
          test "$(git rev-parse "${{ steps.release.outputs.tag }}^{commit}")" = \
            "${{ steps.release.outputs.target_sha }}"
          git rev-parse "${{ steps.release.outputs.tag }}^{commit}"
          git ls-remote --exit-code --tags origin "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Log in to primary container registry
        if: steps.image-tags.outputs.primary_publish == 'true'
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME || github.actor }}
        run: |
          echo "$REGISTRY_TOKEN" | docker login "$CONTAINER_REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin

      - name: Log in to GitHub Container Registry
        if: steps.image-tags.outputs.ghcr_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USERNAME: ${{ github.actor }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$REGISTRY_USERNAME" --password-stdin

      - name: Build and push Docker images
        if: steps.image-tags.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image-tags.outputs.version }}

      - name: Publish release
        shell: bash
        env:
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail

          api="${GITHUB_API_URL:-${GITHUB_SERVER_URL}/api/v1}"
          repo_api="${api}/repos/${GITHUB_REPOSITORY}"
          auth_header="Authorization: token ${API_TOKEN}"

          release_stderr="$(mktemp)"
          if release="$(
            curl --fail --silent --show-error \
              -H "$auth_header" \
              -H "Accept: application/json" \
              "${repo_api}/releases/tags/${TAG}" 2>"$release_stderr"
          )"; then
            :
          else
            curl_status="$?"
            if grep -q "404" "$release_stderr"; then
              release=""
            else
              cat "$release_stderr" >&2
              rm -f "$release_stderr"
              exit "$curl_status"
            fi
          fi
          rm -f "$release_stderr"

          if [ -n "$release" ]; then
            release_id="$(jq -r '.id' <<< "$release")"
            is_draft="$(jq -r '.draft' <<< "$release")"
            if [ "$is_draft" != "true" ] && [ "$PRERELEASE" != "true" ]; then
              echo "Published release $TAG already exists; refusing to overwrite it."
              exit 1
            fi

            payload="$(
              jq -n \
                --arg tag "$TAG" \
                --arg name "$TAG" \
                --arg target "$TARGET_SHA" \
                --argjson draft "$DRAFT" \
                --argjson prerelease "$PRERELEASE" \
                '{
                  tag_name: $tag,
                  name: $name,
                  target_commitish: $target,
                  draft: $draft,
                  prerelease: $prerelease
                }'
            )"
            release="$(
              curl --fail-with-body --silent --show-error \
                --request PATCH \
                -H "$auth_header" \
                -H "Content-Type: application/json" \
                --data "$payload" \
                "${repo_api}/releases/${release_id}"
            )"
          else
            payload="$(
              jq -n \
                --arg tag "$TAG" \
                --arg name "$TAG" \
                --arg target "$TARGET_SHA" \
                --argjson draft "$DRAFT" \
                --argjson prerelease "$PRERELEASE" \
                --argjson generate_notes "$([ "$GITHUB_SERVER_URL" = "https://github.com" ] && echo true || echo false)" \
                '{
                  tag_name: $tag,
                  name: $name,
                  target_commitish: $target,
                  draft: $draft,
                  prerelease: $prerelease,
                  generate_release_notes: $generate_notes
                }'
            )"
            release="$(
              curl --fail-with-body --silent --show-error \
                --request POST \
                -H "$auth_header" \
                -H "Content-Type: application/json" \
                --data "$payload" \
                "${repo_api}/releases"
            )"
          fi

          release_id="$(jq -r '.id' <<< "$release")"
          upload_url="$(jq -r '.upload_url // empty' <<< "$release" | sed 's/{.*$//')"
          if [ -z "$upload_url" ]; then
            upload_url="${repo_api}/releases/${release_id}/assets"
          fi

          shopt -s nullglob
          files=(dist/release/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files matched dist/release/*."
            exit 1
          fi

          assets="$(
            curl --fail-with-body --silent --show-error \
              -H "$auth_header" \
              -H "Accept: application/json" \
              "${repo_api}/releases/${release_id}/assets"
          )"

          for file in "${files[@]}"; do
            name="$(basename "$file")"
            existing_id="$(jq -r --arg name "$name" '.[] | select(.name == $name) | .id' <<< "$assets" | head -1)"
            if [ -n "$existing_id" ]; then
              if [ "$GITHUB_SERVER_URL" = "https://github.com" ]; then
                delete_url="${repo_api}/releases/assets/${existing_id}"
              else
                delete_url="${repo_api}/releases/${release_id}/assets/${existing_id}"
              fi
              curl --fail-with-body --silent --show-error \
                --request DELETE -H "$auth_header" "$delete_url"
            fi

            encoded_name="$(jq -rn --arg value "$name" '$value|@uri')"
            if [ "$GITHUB_SERVER_URL" = "https://github.com" ]; then
              curl --fail-with-body --silent --show-error \
                --request POST \
                -H "$auth_header" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@${file}" \
                "${upload_url}?name=${encoded_name}" \
                >/dev/null
            else
              curl --fail-with-body --silent --show-error \
                --request POST \
                -H "$auth_header" \
                --form "attachment=@${file}" \
                "${upload_url}?name=${encoded_name}" \
                >/dev/null
            fi
            echo "Uploaded $name"
          done

  optional-platform-tests:
    if: github.server_url == 'https://github.com'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.2.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir web build

      - name: Test Go
        run: go test ./...

      - name: Test Go (dev build)
        run: go test -tags dev ./...

      - name: Build Tailor
        run: go build ./cmd/tailor
