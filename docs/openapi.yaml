openapi: 3.1.0
info:
  title: Tailor API
  version: 0.1.0
paths:
  /api/health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Server health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/topology:
    get:
      operationId: getTopology
      responses:
        "200":
          description: Current tailnet topology snapshot. The topology socket sends the same shape as a topology.snapshot payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopologyResponse"
        "503":
          description: Tailscale LocalAPI is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalAPIStatusResponse"
  /api/status:
    get:
      operationId: getStatus
      responses:
        "200":
          description: LocalAPI connectivity status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalAPIStatusResponse"
  /api/cloud/status:
    get:
      operationId: getCloudStatus
      responses:
        "200":
          description: Cloud API authentication status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAuthStatusResponse"
  /api/cloud/auth:
    post:
      operationId: authenticateCloud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudAuthRequest"
      responses:
        "200":
          description: API key authentication succeeded and policy was fetched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAuthStatusResponse"
        "400":
          description: Invalid auth request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Tailscale Cloud API request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/policy:
    get:
      operationId: getPolicy
      responses:
        "200":
          description: Current tailnet policy file as raw HuJSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
        "401":
          description: Cloud API authentication has not been enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Tailscale Cloud API request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
        version:
          type: string
    LocalAPIStatusResponse:
      type: object
      required: [available, localApiEndpoint]
      properties:
        available:
          type: boolean
        localApiEndpoint:
          type: string
        error:
          type: string
    Device:
      type: object
      required: [id, name, ip, tailscaleIps, os, online, owner, tags, subnetRouter, routedSubnets]
      properties:
        id:
          type: string
        name:
          type: string
        ip:
          type: string
        tailscaleIps:
          type: array
          items:
            type: string
        os:
          type: string
        online:
          type: boolean
        owner:
          type: string
        tags:
          type: array
          items:
            type: string
        subnetRouter:
          type: boolean
        routedSubnets:
          type: array
          items:
            type: string
        lastSeen:
          type: string
    EdgeKind:
      type: string
      enum: [owner, tag, subnet, acl]
    Edge:
      type: object
      required: [id, from, to, kind]
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        kind:
          $ref: "#/components/schemas/EdgeKind"
        labels:
          type: array
          items:
            type: string
    TopologyResponse:
      type: object
      required: [devices, edges]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
    CloudAuthRequest:
      type: object
      required: [tailnet, apiKey]
      properties:
        tailnet:
          type: string
        apiKey:
          type: string
    CloudAuthStatusResponse:
      type: object
      required: [authenticated, hasPolicy]
      properties:
        authenticated:
          type: boolean
        tailnet:
          type: string
        hasPolicy:
          type: boolean
    PolicyResponse:
      type: object
      required: [tailnet, hujson]
      properties:
        tailnet:
          type: string
        hujson:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
