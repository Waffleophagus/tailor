openapi: 3.1.0
info:
  title: Tailor API
  version: 0.1.0
paths:
  /api/health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Server health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/topology:
    get:
      operationId: getTopology
      responses:
        "200":
          description: Current tailnet topology snapshot. The topology socket sends the same shape as a topology.snapshot payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopologyResponse"
        "503":
          description: Tailscale LocalAPI is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalAPIStatusResponse"
  /api/status:
    get:
      operationId: getStatus
      responses:
        "200":
          description: LocalAPI connectivity status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalAPIStatusResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
        version:
          type: string
    LocalAPIStatusResponse:
      type: object
      required: [available, socketPath]
      properties:
        available:
          type: boolean
        socketPath:
          type: string
        error:
          type: string
    Device:
      type: object
      required: [id, name, ip, tailscaleIps, os, online, owner, tags, subnetRouter, routedSubnets]
      properties:
        id:
          type: string
        name:
          type: string
        ip:
          type: string
        tailscaleIps:
          type: array
          items:
            type: string
        os:
          type: string
        online:
          type: boolean
        owner:
          type: string
        tags:
          type: array
          items:
            type: string
        subnetRouter:
          type: boolean
        routedSubnets:
          type: array
          items:
            type: string
        lastSeen:
          type: string
    EdgeKind:
      type: string
      enum: [owner, tag, subnet, acl]
    Edge:
      type: object
      required: [id, from, to, kind]
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: string
        kind:
          $ref: "#/components/schemas/EdgeKind"
        labels:
          type: array
          items:
            type: string
    TopologyResponse:
      type: object
      required: [devices, edges]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
