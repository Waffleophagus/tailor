<svg
	xmlns="http://www.w3.org/2000/svg"
	viewBox="210 150 380 410"
	fill="none"
>
	<defs>
		<linearGradient
			id="logo-die-top"
			x1="0%"
			y1="0%"
			x2="100%"
			y2="100%"
		>
			<stop offset="0%" stop-color="oklch(0.84 0.15 78)"></stop>
			<stop offset="100%" stop-color="oklch(0.68 0.13 52)"></stop>
		</linearGradient>
		<linearGradient
			id="logo-die-left"
			x1="0%"
			y1="0%"
			x2="0%"
			y2="100%"
		>
			<stop offset="0%" stop-color="oklch(0.62 0.13 42)"></stop>
			<stop offset="100%" stop-color="oklch(0.43 0.095 38)"></stop>
		</linearGradient>
		<linearGradient
			id="logo-die-right"
			x1="0%"
			y1="0%"
			x2="100%"
			y2="0%"
		>
			<stop offset="0%" stop-color="oklch(0.46 0.08 275)"></stop>
			<stop offset="100%" stop-color="oklch(0.34 0.06 275)"></stop>
		</linearGradient>
	</defs>
	<g
		stroke="oklch(0.9 0.02 80 / 0.34)"
		stroke-width="10"
		stroke-linejoin="round"
	>
		<polygon
			points="270,275 400,200 530,275 400,350"
			fill="url(#logo-die-top)"></polygon>
		<polygon
			points="270,275 400,350 400,500 270,425"
			fill="url(#logo-die-left)"></polygon>
		<polygon
			points="400,350 530,275 530,425 400,500"
			fill="url(#logo-die-right)"></polygon>
	</g>
	<g fill="oklch(0.145 0.012 265 / 0.92)">
		<g transform="matrix(130 75 -130 75 400 200)">
			<circle cx="0.25" cy="0.25" r="0.1"></circle><circle
				cx="0.25"
				cy="0.50"
				r="0.1"></circle><circle
				cx="0.25"
				cy="0.75"
				r="0.1"></circle>
			<circle cx="0.75" cy="0.25" r="0.1"></circle><circle
				cx="0.75"
				cy="0.50"
				r="0.1"></circle><circle
				cx="0.75"
				cy="0.75"
				r="0.1"></circle>
		</g>
		<g transform="matrix(130 75 0 150 270 275)"
			><circle cx="0.25" cy="0.25" r="0.1"
			></circle><circle cx="0.75" cy="0.75" r="0.1"
			></circle></g
		>
		<g transform="matrix(130 -75 0 150 400 350)"
			><circle cx="0.25" cy="0.75" r="0.1"
			></circle><circle cx="0.50" cy="0.50" r="0.1"
			></circle><circle cx="0.75" cy="0.25" r="0.1"
			></circle></g
		>
	</g>
</svg>
