services:
  tailor:
    build: .
    # Optional when using TAILSCALE_AUTHKEY or TS_AUTHKEY — Tailor is reachable
    # on the tailnet at https://<TAILSCALE_HOSTNAME>.<your-tailnet>.ts.net/.
    ports:
      - "8080:8080"
    environment:
      TAILOR_ADDR: ":8080"
      TAILOR_LOG_DIR: /var/log/tailor

      # auto chooses embedded tsnet mode unless you provide an external LocalAPI socket.
      # Use "embedded" to force Tailor to join the tailnet directly, or
      # "external" to force Tailor to use a mounted host socket.
      TAILOR_TAILSCALE_MODE: "auto"

      # Embedded mode (required on Docker Desktop — the UI will prompt if missing):
      # Set an auth key when you want this container to join the tailnet as its
      # own Tailscale node. Create one in the Tailscale admin console.
      # TAILSCALE_AUTHKEY: "tskey-auth-..."
      # TS_AUTHKEY: "tskey-auth-..."
      # TAILSCALE_HOSTNAME: "tailor"
      # Then open https://tailor.<your-tailnet>.ts.net/ (no :8080 needed).
      # TS_ADVERTISE_TAGS: "tag:tailor-acl-service"

      # Host socket mode:
      # Uncomment this plus the volume below to piggyback on the host's Linux
      # tailscaled instead of running tailscaled inside the container.
      # TAILOR_TAILSCALE_MODE: "external"
      # TAILOR_LOCALAPI_SOCKET: "/var/run/tailscale/tailscaled.sock"

      # MCP server (optional):
      # Expose the MCP endpoint so AI agents can inspect and draft policy changes.
      # "localhost" = loopback only; "tailnet" = any tailnet client; "public" = internet-facing.
      # A token is required for tailnet or public exposure.
      # TAILOR_MCP: "localhost"
      # TAILOR_MCP_PATH: "/mcp"
      # TAILOR_MCP_TOKEN: "your-bearer-token-here"
      # TAILOR_MCP_READONLY: "true"

    volumes:
      - ./tailor-state:/var/lib/tailor-tsnet
      - ./tailor-logs:/var/log/tailor

    # Host socket mode volume:
    # Only works on Linux hosts with a tailscaled Unix socket at this path.
    # volumes:
    #   - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock:ro
